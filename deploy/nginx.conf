# ─────────────────────────────────────────────────────────────────────────────
# Endo Digital Twin — Nginx Reverse Proxy Configuration
# Proxies port 80 → Streamlit on port 8501
# Place this file at: /etc/nginx/sites-available/endo-digital-twin
# Enable with: ln -s /etc/nginx/sites-available/endo-digital-twin /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

upstream streamlit_app {
    server 127.0.0.1:8501;
}

server {
    listen 80;
    listen [::]:80;

    # Replace with your domain or EC2 public IP
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Increase buffer sizes for Streamlit's server-sent events
    proxy_buffering off;

    location / {
        proxy_pass         http://streamlit_app;
        proxy_http_version 1.1;

        # Required for Streamlit WebSocket support
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Timeouts (important for long-running LLM calls)
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    300s;

        # Disable proxy buffering for SSE / real-time updates
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets — serve directly for performance
    location /_stcore/ {
        proxy_pass         http://streamlit_app/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade   $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Health check endpoint
    location /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Logging
    access_log /var/log/nginx/endo-digital-twin-access.log;
    error_log  /var/log/nginx/endo-digital-twin-error.log;
}
